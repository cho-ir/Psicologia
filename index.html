<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cuestionario de autoexploración</title>
<style>
  :root {
    --bg: #f4f9f8;
    --card: #ffffff;
    --text: #2c3e50;
    --soft: #5a6c7d;
    --primary: #4a8a85;
    --border: #d5e6e3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: radial-gradient(circle at top, #eef7f6, var(--bg) 55%);
    color: var(--text);
    font-family: "Segoe UI", Arial, sans-serif;
  }
  .card {
    width: min(560px, 100%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    box-shadow: 0 10px 30px rgba(45, 93, 90, 0.08);
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1.35rem;
    color: #2d5d5a;
  }
  p {
    margin: 0;
    line-height: 1.6;
    color: var(--soft);
  }
  .bar {
    height: 10px;
    margin-top: 18px;
    border-radius: 999px;
    background: #e8f3f1;
    overflow: hidden;
  }
  .bar::after {
    content: "";
    display: block;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, #6db6b0, var(--primary));
    animation: load 1.1s ease-in-out infinite alternate;
  }
  .error {
    margin-top: 16px;
    padding: 14px;
    border-radius: 12px;
    background: #fceaea;
    color: #8b3e3e;
    display: none;
  }
  .error.show { display: block; }
  @keyframes load {
    from { transform: translateX(-10%); }
    to { transform: translateX(150%); }
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Preparando el cuestionario</h1>
    <p id="status">Cargando la versión interactiva…</p>
    <div class="bar" aria-hidden="true"></div>
    <div id="error" class="error"></div>
  </main>
<script>
async function decodeBundle(base64Text) {
  const binary = atob(base64Text.trim());
  const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
  if (typeof DecompressionStream !== "undefined") {
    const stream = new Response(bytes).body.pipeThrough(new DecompressionStream("gzip"));
    return await new Response(stream).text();
  }
  throw new Error("Tu navegador no soporta DecompressionStream.");
}

async function loadApp() {
  try {
    const res = await fetch("./app.bundle.gz.b64.txt", { cache: "no-store" });
    if (!res.ok) throw new Error("No se pudo descargar el cuestionario.");
    document.getElementById("status").textContent = "Iniciando cuestionario…";
    const bundle = await res.text();
    const html = await decodeBundle(bundle);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    const errorBox = document.getElementById("error");
    document.getElementById("status").textContent = "No se pudo abrir el cuestionario.";
    errorBox.classList.add("show");
    errorBox.textContent = err && err.message ? err.message : "Error inesperado al cargar la aplicación.";
    console.error(err);
  }
}

loadApp();
</script>
</body>
</html>
